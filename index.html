<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 다운로더 (실시간 다운로드 버전)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 22px; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #27ae60; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #statusBox { display: none; margin-top: 20px; padding: 15px; border-radius: 6px; background: #ebf5fb; border: 1px solid #aed6f1; text-align: center; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(52,152,219,.3); border-radius: 50%; border-top-color: #3498db; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #downloadArea { display: none; margin-top: 20px; }
        .btn-download { background: #e67e22; }
        .btn-download:hover { background: #d35400; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 소설 다운로더 & EPUB 변환기</h1>
    
    <div class="form-group">
        <label>GitHub 개인 토큰 (Classic Token)</label>
        <input type="text" id="ghToken" placeholder="ghp_...">
    </div>
    
    <div class="form-group">
        <label>연동 서비스 선택</label>
        <select id="siteType" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px;">
            <option value="syosetu">소설가가 되자 (n코드)</option>
            <option value="kakuyomu">카쿠요무 (Kakuyomu)</option>
        </select>
    </div>

    <div class="form-group">
        <label>소설 코드 또는 URL 전체</label>
        <input type="text" id="novelCode" placeholder="n2077lm 또는 카쿠요무 소설번호">
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>시작 화수</label>
            <input type="number" id="startPage" value="1">
        </div>
        <div style="flex: 1;">
            <label>끝 화수</label>
            <input type="number" id="endPage" value="10">
        </div>
    </div>
    
    <button id="startBtn" onclick="triggerDownload()">⚡ 소설 다운로드 시작</button>

    <div id="statusBox">
        <div class="spinner"></div><span id="statusText">GitHub 서버를 깨우는 중...</span>
    </div>

    <div id="downloadArea">
        <button id="dlBtn" class="btn-download" onclick="downloadFile()">📥 EPUB 파일 다운로드 받기</button>
    </div>
</div>

<script>
let checkInterval = null;
let downloadUrl = "";

// index.html 내의 triggerDownload() 함수 본문 수정
async function triggerDownload() {
    const token = document.getElementById('ghToken').value.trim();
    let code = document.getElementById('novelCode').value.trim();
    const start = document.getElementById('startPage').value;
    const end = document.getElementById('endPage').value;
    const site = document.getElementById('siteType').value; // 추가

    if (!token || !code) {
        alert("토큰과 소설 코드를 모두 입력해주세요.");
        return;
    }

    // URL에서 코드만 파싱해내는 프론트엔드 안전장치
    if(code.includes("syosetu.com")) {
        const parts = code.split('/');
        code = parts[parts.length - 2] || parts[parts.length - 1];
    } else if(code.includes("kakuyomu.jp")) {
        const parts = code.split('/');
        code = parts[parts.length - 1];
    }

    const pathParts = window.location.pathname.split('/');
    const repoName = pathParts[1] || "syosetu-downloader"; 
    const owner = window.location.hostname.split('.')[0];

    const triggerUrl = `https://api.github.com/repos/${owner}/${repoName}/actions/workflows/download.yml/dispatches`;

    document.getElementById('startBtn').disabled = true;
    document.getElementById('downloadArea').style.display = "none";
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    statusBox.style.display = "block";
    statusText.innerText = "GitHub Actions 서버 신호 송신 중...";

    try {
        const response = await fetch(triggerUrl, {
            method: 'POST',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: { 
                    novel_code: code, 
                    start_page: start, 
                    end_page: end,
                    site_type: site // 이 인자를 GitHub 액션에 같이 던집니다.
                }
            })
        });

        if (response.status === 204) {
            statusText.innerText = "🚀 서버 구동 성공! 깃허브에서 크롤링 진행 중... (약 1~2분 소요)";
            setTimeout(() => {
                checkInterval = setInterval(() => checkServerStatus(owner, repoName, token, code), 7000);
            }, 10000);
        } else {
            const errData = await response.json();
            alert(`❌ 서버 호출 실패: ${errData.message}`);
            resetUI();
        }
    } catch (e) {
        alert(`오류 발생: ${e.message}`);
        resetUI();
    }
}

        
async function checkServerStatus(owner, repoName, token, code) {
    // 깃허브 빌드 결과물(Artifacts) 목록을 조회하여 파일이 생성되었는지 확인
    const artifactUrl = `https://api.github.com/repos/${owner}/${repoName}/actions/artifacts?per_page=1`;
    
    try {
        const response = await fetch(artifactUrl, {
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (response.ok) {
            const data = await response.json();
            if (data.artifacts && data.artifacts.length > 0) {
                const latest = data.artifacts[0];
                // 방금 보낸 요청 코드와 일치하는 결과물이 생성되었는지 판별
                if (latest.name.includes(code)) {
                    clearInterval(checkInterval);
                    
                    // GitHub API를 통한 다이렉트 zip 다운로드 주소 세팅
                    downloadUrl = `https://api.github.com/repos/${owner}/${repoName}/actions/artifacts/${latest.id}/zip`;
                    
                    document.getElementById('statusBox').style.display = "none";
                    document.getElementById('downloadArea').style.display = "block";
                    document.getElementById('startBtn').disabled = false;
                    
                    // 유저 편의를 위해 자동으로 다운로드 시도
                    downloadFile();
                }
            }
        }
    } catch (e) {
        console.error("상태 확인 중 오류:", e);
    }
}

function downloadFile() {
    if (!downloadUrl) return;
    const token = document.getElementById('ghToken').value.trim();
    
    // GitHub API 파일 다운로드는 Authorization 헤더가 필요하므로 fetch를 우회해 다운로드 처리
    fetch(downloadUrl, {
        headers: { 'Authorization': `token ${token}` }
    })
    .then(response => response.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${document.getElementById('novelCode').value.trim()}_epub.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    })
    .catch(err => alert("다운로드에 실패했습니다: " + err.message));
}

function resetUI() {
    document.getElementById('startBtn').disabled = false;
    document.getElementById('statusBox').style.style.display = "none";
}
</script>
</body>
</html>
